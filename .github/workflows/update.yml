name: update

permissions:
  contents: write

on:
  push:
    branches:
      - "main"
  schedule:
    - cron: "0 0 * * *"
  pull_request:
  workflow_dispatch:

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

defaults:
  run:
    shell: bash --noprofile --norc -CeEuo pipefail {0}

jobs:
  bench:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            os: macos-latest
          - name: windows
            os: windows-latest
          - name: ubuntu
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    name: bench-${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: ahaoboy/js-engine-setup@v1
        with:
          strip: true
      - uses: actions/setup-node@v6
        with:
          node-version: latest
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: canary
      - uses: denoland/setup-deno@v2
        with:
          deno-version: canary
      - name: Install Ant
        run: |
          case "${RUNNER_OS}-$(uname -m)" in
            Linux-x86_64) target="linux-x64" ;;
            Linux-aarch64|Linux-arm64) target="linux-aarch64" ;;
            macOS-x86_64) target="darwin-x64" ;;
            macOS-arm64) target="darwin-aarch64" ;;
            Windows-*) target="windows-x64" ;;
            *) echo "unsupported Ant target: ${RUNNER_OS}-$(uname -m)" >&2; exit 1 ;;
          esac

          install_dir="$RUNNER_TEMP/ant/bin"
          mkdir -p "$install_dir"
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            curl -fsSL "https://manifest.antjs.org/v1/download/ant/$target" -o "$install_dir/ant.exe"
            echo "$(cygpath -w "$install_dir")" >> "$GITHUB_PATH"
          else
            curl -fsSL "https://manifest.antjs.org/v1/download/ant/$target" -o "$install_dir/ant"
            chmod +x "$install_dir/ant"
            echo "$install_dir" >> "$GITHUB_PATH"
          fi
      - name: run
        run: |
          bun run --silent build
          rm -rf ${{ matrix.name }}.json
          bun run --silent update > ${{ matrix.name }}.json

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ./${{ matrix.name }}.json
  update:
    needs: ["bench"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: latest
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/download-artifact@v4
        with:
          path: windows
          pattern: windows
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          path: ubuntu
          pattern: ubuntu
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          path: macos-arm64
          pattern: macos-arm64
          merge-multiple: true

      - name: update json
        if: github.ref == 'refs/heads/main'
        run: |
          mv ./ubuntu/ubuntu.json ./ubuntu.json
          mv ./windows/windows.json ./windows.json
          mv ./macos-arm64/macos-arm64.json ./macos-arm64.json
          rm -rf ./ubuntu
          rm -rf ./windows
          rm -rf ./macos-arm64
          bun run --silent build
          bun run --silent update:doc

      - name: build web
        if: github.ref == 'refs/heads/main'
        run: |
          cd web
          pnpm i
          bun run update:data
          bun run build
      - name: commit
        if: github.ref == 'refs/heads/main'
        run: |
          git config --global user.email "504595380@qq.com"
          git config --global user.name "ahaoboy-ci"
          git add .
          git commit -am"update-by-ci"
          cat README.md

      - name: Upload README
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: README
          path: README.md

      - name: Push changes
        uses: ad-m/github-push-action@master
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}

      - name: Deploy to doc branch
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web/dist
          publish_branch: doc
          force_orphan: true
          cname: github.com

      - name: release
        uses: ncipollo/release-action@v1
        if: github.ref == 'refs/heads/main'
        with:
          artifacts: "./*.json,dist/run.js"
          allowUpdates: true
          tag: "nightly"
          name: "nightly"
          token: ${{ secrets.GITHUB_TOKEN }}
          commit: main
          replacesArtifacts: true
